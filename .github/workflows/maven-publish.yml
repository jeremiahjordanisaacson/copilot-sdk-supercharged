name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Import GPG key
        run: |
          echo "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build JAR, sources, and javadoc
        run: mvn clean package source:jar javadoc:jar -DskipTests

      - name: Create signed bundle for Central Portal
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT=copilot-sdk-supercharged
          GROUP_DIR=io/github/jeremiahjordanisaacson
          DIR=staging/$GROUP_DIR/$ARTIFACT/$VERSION
          mkdir -p $DIR

          # Copy artifacts
          cp target/$ARTIFACT-$VERSION.jar $DIR/
          cp target/$ARTIFACT-$VERSION-sources.jar $DIR/
          cp target/$ARTIFACT-$VERSION-javadoc.jar $DIR/
          cp pom.xml $DIR/$ARTIFACT-$VERSION.pom

          # Sign and generate checksums
          cd $DIR
          for f in *.jar *.pom; do
            gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.MAVEN_GPG_PASSPHRASE }}" -ab "$f"
            md5sum "$f" | cut -d' ' -f1 > "$f.md5"
            sha1sum "$f" | cut -d' ' -f1 > "$f.sha1"
          done
          cd -

          # Create bundle zip
          cd staging
          zip -r ../bundle.jar .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: java/build/staging/bundle.jar

      - name: Upload to Maven Central Portal
        run: |
          TOKEN=$(echo -n "${{ secrets.MAVEN_USERNAME }}:${{ secrets.MAVEN_PASSWORD }}" | base64 -w0)
          curl --fail -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=copilot-sdk-supercharged-${GITHUB_REF_NAME#v}" \
            -H "Authorization: UserToken $TOKEN" \
            -F "bundle=@bundle.jar"
