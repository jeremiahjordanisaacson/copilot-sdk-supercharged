name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build JAR, sources, and javadoc
        run: mvn clean package source:jar javadoc:jar -DskipTests

      - name: Create bundle for Central Portal
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT=copilot-sdk-supercharged
          GROUP_DIR=io/github/jeremiahjordanisaacson
          DIR=staging/$GROUP_DIR/$ARTIFACT/$VERSION
          mkdir -p $DIR

          # Copy artifacts
          cp target/$ARTIFACT-$VERSION.jar $DIR/
          cp target/$ARTIFACT-$VERSION-sources.jar $DIR/
          cp target/$ARTIFACT-$VERSION-javadoc.jar $DIR/
          cp pom.xml $DIR/$ARTIFACT-$VERSION.pom

          # Generate checksums (required by Central Portal)
          cd $DIR
          for f in *.jar *.pom; do
            md5sum "$f" | cut -d' ' -f1 > "$f.md5"
            sha1sum "$f" | cut -d' ' -f1 > "$f.sha1"
            sha256sum "$f" | cut -d' ' -f1 > "$f.sha256"
          done
          cd -

          # Create bundle zip
          cd staging
          jar -cvf ../bundle.jar .

      - name: Upload to Maven Central Portal
        run: |
          TOKEN=$(echo -n "${{ secrets.MAVEN_USERNAME }}:${{ secrets.MAVEN_PASSWORD }}" | base64 -w0)
          curl --fail -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=copilot-sdk-supercharged-${GITHUB_REF_NAME#v}" \
            -H "Authorization: UserToken $TOKEN" \
            -F "bundle=@bundle.jar"
