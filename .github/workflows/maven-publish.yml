name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build JAR, sources, and javadoc
        run: mvn clean package source:jar javadoc:jar -DskipTests

      - name: Create bundle for Central Portal
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT=copilot-sdk-supercharged
          GROUP_DIR=io/github/jeremiahjordanisaacson
          mkdir -p staging/$GROUP_DIR/$ARTIFACT/$VERSION
          cp target/$ARTIFACT-$VERSION.jar staging/$GROUP_DIR/$ARTIFACT/$VERSION/
          cp target/$ARTIFACT-$VERSION-sources.jar staging/$GROUP_DIR/$ARTIFACT/$VERSION/
          cp target/$ARTIFACT-$VERSION-javadoc.jar staging/$GROUP_DIR/$ARTIFACT/$VERSION/
          cp pom.xml staging/$GROUP_DIR/$ARTIFACT/$VERSION/$ARTIFACT-$VERSION.pom
          cd staging
          jar -cvf ../bundle.jar .

      - name: Upload to Maven Central Portal
        run: |
          TOKEN=$(echo -n "${{ secrets.MAVEN_USERNAME }}:${{ secrets.MAVEN_PASSWORD }}" | base64 -w0)
          curl --fail -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=copilot-sdk-supercharged-${GITHUB_REF_NAME#v}" \
            -H "Authorization: UserToken $TOKEN" \
            -F "bundle=@bundle.jar"
