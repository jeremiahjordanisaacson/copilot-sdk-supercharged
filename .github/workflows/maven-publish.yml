name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Build JAR and sources/javadoc
        run: mvn clean package source:jar javadoc:jar -DskipTests

      - name: Create bundle for Central Portal
        run: |
          cd target
          jar -cvf bundle.jar *.pom *.jar *.jar

      - name: Upload to Maven Central Portal
        run: |
          curl --fail -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=copilot-sdk-supercharged-${GITHUB_REF_NAME#v}" \
            -H "Authorization: Bearer $(echo -n '${{ secrets.MAVEN_USERNAME }}:${{ secrets.MAVEN_PASSWORD }}' | base64)" \
            -F "bundle=@target/bundle.jar"
