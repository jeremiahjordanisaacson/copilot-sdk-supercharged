name: Check Upstream Updates

on:
  schedule:
    # Every Monday at 9am UTC (2am PT)
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/github/copilot-sdk.git
          git fetch upstream main --quiet

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          if [ "$BEHIND" -eq 0 ]; then
            echo "Up to date with upstream."
            echo "has_updates=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_updates=true" >> $GITHUB_OUTPUT
          echo "Found $BEHIND new upstream commits."

          # Get commit summary
          SUMMARY=$(git log --oneline HEAD..upstream/main | head -30)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Check for tagged releases
          TAGS=$(git tag --contains $(git merge-base HEAD upstream/main)..upstream/main --sort=-version:refname 2>/dev/null | head -5)
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Categorize: feature commits vs dep bumps
          FEATURES=$(git log --oneline HEAD..upstream/main --grep="Update @github/copilot" --invert-grep | wc -l)
          DEPBUMPS=$(git log --oneline HEAD..upstream/main --grep="Update @github/copilot" | wc -l)
          echo "features=$FEATURES" >> $GITHUB_OUTPUT
          echo "depbumps=$DEPBUMPS" >> $GITHUB_OUTPUT

      - name: Check for existing sync issue
        if: steps.check.outputs.has_updates == 'true'
        id: existing
        run: |
          EXISTING=$(gh issue list --label "upstream-sync" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "issue_exists=true" >> $GITHUB_OUTPUT
            echo "issue_number=$EXISTING" >> $GITHUB_OUTPUT
          else
            echo "issue_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update sync issue
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          FEATURES=${{ steps.check.outputs.features }}
          DEPBUMPS=${{ steps.check.outputs.depbumps }}
          TODAY=$(date -u +%Y-%m-%d)

          # Ensure label exists
          gh label create "upstream-sync" --color "0e8a16" --description "Upstream sync needed" 2>/dev/null || true

          # Write body to file to avoid bash interpretation of backticks
          cat > /tmp/issue-body.md << 'BODYEOF'
          ## Upstream Sync Available
          BODYEOF

          echo "" >> /tmp/issue-body.md
          echo "**${BEHIND} new commits** from \`github/copilot-sdk:main\` (${FEATURES} feature commits, ${DEPBUMPS} dependency bumps)." >> /tmp/issue-body.md
          echo "" >> /tmp/issue-body.md
          echo "### New commits" >> /tmp/issue-body.md
          echo '```' >> /tmp/issue-body.md
          git log --oneline HEAD..upstream/main | head -30 >> /tmp/issue-body.md
          echo '```' >> /tmp/issue-body.md
          echo "" >> /tmp/issue-body.md
          echo "### Actions needed" >> /tmp/issue-body.md
          echo "1. \`git fetch upstream && git merge upstream/main\`" >> /tmp/issue-body.md
          echo "2. Resolve any conflicts" >> /tmp/issue-body.md
          echo "3. Port new features to 17 additional SDKs (if any)" >> /tmp/issue-body.md
          echo "4. Push and verify CI" >> /tmp/issue-body.md
          echo "" >> /tmp/issue-body.md
          echo "---" >> /tmp/issue-body.md
          echo "*Auto-generated by upstream-sync-check workflow on ${TODAY}*" >> /tmp/issue-body.md

          if [ "${{ steps.existing.outputs.issue_exists }}" = "true" ]; then
            gh issue comment ${{ steps.existing.outputs.issue_number }} --body-file /tmp/issue-body.md
            echo "Updated existing issue #${{ steps.existing.outputs.issue_number }}"
          else
            gh issue create \
              --title "Upstream sync: $BEHIND new commits from github/copilot-sdk" \
              --body-file /tmp/issue-body.md \
              --label "upstream-sync"
            echo "Created new sync issue"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
