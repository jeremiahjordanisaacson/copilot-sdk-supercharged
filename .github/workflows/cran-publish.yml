name: Publish to CRAN

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^Version: .*/Version: $VERSION/" DESCRIPTION

      - name: Build package
        run: R CMD build .

      - name: Check package
        run: R CMD check copilot.sdk.supercharged_*.tar.gz --as-cran --no-manual

      - name: Submit to CRAN
        run: |
          Rscript -e "
          pkg <- list.files(pattern = 'copilot\\.sdk\\.supercharged_.+\\.tar\\.gz')
          devtools::submit_cran(pkg)
          "
        env:
          CRAN_MAINTAINER_EMAIL: ${{ secrets.CRAN_MAINTAINER_EMAIL }}
