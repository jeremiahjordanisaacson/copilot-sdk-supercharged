name: Publish to Hackage

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: haskell
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: '3.10'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CABAL_VERSION=$(echo $VERSION | sed 's/\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1.\2.\3.0/')
          sed -i "s/^version: .*/version:            $CABAL_VERSION/" copilot-sdk-supercharged.cabal

      - name: Build sdist
        run: cabal sdist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: haskell/dist-newstyle/sdist/*.tar.gz

      - name: Upload to Hackage
        run: |
          if [ -z "$HACKAGE_PASSWORD" ]; then
            echo "::warning::HACKAGE_PASSWORD secret not configured — skipping upload"
            exit 0
          fi
          for attempt in 1 2 3; do
            cabal upload dist-newstyle/sdist/copilot-sdk-supercharged-*.tar.gz \
              --username="${HACKAGE_USERNAME}" \
              --password="${HACKAGE_PASSWORD}" \
              --publish && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
        env:
          HACKAGE_USERNAME: ${{ secrets.HACKAGE_USERNAME }}
          HACKAGE_PASSWORD: ${{ secrets.HACKAGE_PASSWORD }}
