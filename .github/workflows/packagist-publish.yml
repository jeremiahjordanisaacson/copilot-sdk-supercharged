name: Publish to Packagist

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: php/composer.json
      - name: Notify Packagist
        run: |
          curl -XPOST \
            -H 'content-type: application/json' \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" \
            -d '{"repository":{"url":"https://github.com/jeremiahjordanisaacson/copilot-sdk-supercharged"}}'
