name: "CI: Sync Wiki on Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout wiki
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update changelog in wiki
        run: |
          SEMVER_TAG_REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "${GITHUB_REF_NAME}" =~ ${SEMVER_TAG_REGEX} ]]; then
            echo "Skipping changelog update for non-release ref ${GITHUB_REF_NAME}"
            exit 0
          fi

          VERSION=${GITHUB_REF_NAME#v}
          DATE=$(date +%Y-%m-%d)

          # Update the Changelog page with the new version header
          if ! grep -q "## v${VERSION}" wiki/Changelog.md 2>/dev/null; then
            # Prepend new version section after the title
            sed -i "/^# Changelog/a\\
            \\
            ## v${VERSION} (${DATE})\\
            \\
            See [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF_NAME}) for full details." wiki/Changelog.md
            echo "Added v${VERSION} to changelog"
          else
            echo "v${VERSION} already in changelog"
          fi

      - name: Sync canonical docs to wiki
        run: |
          copy_doc() {
            local source="$1"
            local target="$2"

            if [ -f "$source" ]; then
              cp "$source" "wiki/$target"
              echo "Synced $target from $source"
            else
              echo "Missing source doc: $source" >&2
              exit 1
            fi
          }

          copy_doc docs/auth/byok.md BYOK.md
          copy_doc docs/setup/azure-managed-identity.md Setup-Azure-Managed-Identity.md
          copy_doc docs/setup/bundled-cli.md Setup-Bundled-CLI.md
          copy_doc docs/setup/local-cli.md Setup-Local-CLI.md
          copy_doc docs/troubleshooting/compatibility.md Compatibility.md

          python3 <<'PY'
          from pathlib import Path

          # Multiple source docs intentionally collapse to a single wiki page.
          wiki_link_aliases = [
              ("../auth/byok.md", "BYOK"),
              ("./index.md", "Authentication"),
              ("../auth/authenticate.md", "Authentication"),
              ("../getting-started.md", "Getting-Started"),
              ("./bundled-cli.md", "Setup-Bundled-CLI"),
              ("./local-cli.md", "Setup-Local-CLI"),
              ("./github-oauth.md", "Setup-GitHub-OAuth"),
              ("./backend-services.md", "Setup-Backend-Services"),
              ("../features/session-persistence.md", "Session-Persistence"),
              ("../features/mcp.md", "MCP-Server-Integration"),
              ("../hooks/index.md", "Hooks"),
              ("../hooks/hooks-overview.md", "Hooks"),
              ("../troubleshooting/debugging.md", "Debugging"),
              ("./debugging.md", "Debugging"),
          ]

          for name in [
              "BYOK.md",
              "Setup-Azure-Managed-Identity.md",
              "Setup-Bundled-CLI.md",
              "Setup-Local-CLI.md",
              "Compatibility.md",
          ]:
              path = Path("wiki") / name
              text = path.read_text()
              for old, new in wiki_link_aliases:
                  text = text.replace(f"]({old})", f"]({new})")
              path.write_text(text)
          PY

          # Keep wiki-only pages aligned with current repo facts.
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("wiki/Installation.md")
          if path.exists():
              lines = path.read_text().splitlines()
              bundled_cli_heading = re.compile(r"^##\s+.*SDKs?.*bundled CLI.*$", re.IGNORECASE)
              heading_index = next(
                  (
                      index
                      for index, line in enumerate(lines)
                      if bundled_cli_heading.match(line)
                  ),
                  None,
              )

              if heading_index is not None:
                  lines[heading_index] = "## Core SDKs"

                  paragraph_index = heading_index + 1
                  while paragraph_index < len(lines) and not lines[paragraph_index].strip():
                      paragraph_index += 1

                  if paragraph_index < len(lines) and not lines[paragraph_index].startswith("|"):
                      lines[paragraph_index] = (
                          "Node.js, Python, and .NET bundle the Copilot CLI automatically. "
                          "Go is a core SDK but requires a separately installed CLI or explicit `CLIPath`."
                      )
              else:
                  print("Warning: Installation.md bundled CLI SDK heading was not found")

              path.write_text("\n".join(lines) + "\n")
          PY

      - name: Update download counts
        run: |
          # Fetch latest download counts
          NPM=$(curl -sf "https://api.npmjs.org/downloads/point/1000-01-01:3000-01-01/copilot-sdk-supercharged" | jq -r '.downloads // 0')
          PYPI=$(curl -sf "https://pypistats.org/api/packages/copilot-sdk-supercharged/overall" | python3 -c "import sys,json; print(sum(r['downloads'] for r in json.load(sys.stdin).get('data',[])))" 2>/dev/null || echo "0")
          CRATES=$(curl -sf -H 'User-Agent: wiki-sync' "https://crates.io/api/v1/crates/copilot-sdk-supercharged" | jq -r '.crate.downloads // 0')
          RUBYGEMS=$(curl -sf "https://rubygems.org/api/v1/gems/copilot-sdk-supercharged.json" | jq -r '.downloads // 0')
          NUGET=$(curl -sf "https://azuresearch-usnc.nuget.org/query?q=CopilotSDK.Supercharged&take=1" | jq -r '.data[0].totalDownloads // 0')
          HEX=$(curl -sf "https://hex.pm/api/packages/copilot_sdk_supercharged" | jq -r '.downloads.all // 0')

          TOTAL=$((NPM + PYPI + CRATES + RUBYGEMS + NUGET + HEX))
          echo "Total downloads: $TOTAL"

          # Round to nearest thousand
          ROUNDED=$(( (TOTAL / 1000) * 1000 ))
          COUNT="${ROUNDED}+"

          # Update Home.md
          if [ -f wiki/Home.md ]; then
            sed -i "s/Trusted by [0-9,]*+ developers/Trusted by ${COUNT} developers/" wiki/Home.md
            echo "Updated Home.md to ${COUNT}"
          fi

      - name: Push wiki updates
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to push"
          else
            git commit -m "Auto-update wiki for ${GITHUB_REF_NAME}"
            git push
            echo "Wiki updated for ${GITHUB_REF_NAME}"
          fi
