models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the allowed_tool with input 'test'. Do NOT use excluded_tool.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: allowed_tool
              arguments: '{"input":"test"}'
      - role: tool
        tool_call_id: toolcall_0
        content: ALLOWED_TEST
      - role: assistant
        content: I've successfully called the allowed_tool with input 'test'. The tool returned "ALLOWED_TEST". As requested, I
          did not use the excluded_tool.
