models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the stable_tool with input 'test1' and tell me the result.
      - role: assistant
        content: I'll call the stable_tool with input 'test1' for you.
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: stable_tool
              arguments: '{"input":"test1"}'
      - role: tool
        tool_call_id: toolcall_0
        content: STABLE_test1
      - role: assistant
        content: "The stable_tool returned: **STABLE_test1**"
      - role: user
        content: Use the ephemeral_tool with input 'test2' and tell me the result.
      - role: assistant
        content: I'll call the ephemeral_tool with input 'test2' for you.
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: ephemeral_tool
              arguments: '{"input":"test2"}'
      - role: tool
        tool_call_id: toolcall_1
        content: EPHEMERAL_test2
      - role: assistant
        content: "The ephemeral_tool returned: **EPHEMERAL_test2**"
      - role: user
        content: >-
          <tools_changed_notice>

          Tools no longer available: ephemeral_tool


          Important: Do not attempt to call tools that are no longer available unless you've been notified that they're
          available again.

          </tools_changed_notice>


          Use the stable_tool with input 'still_here'. Also try using ephemeral_tool if it is available.
      - role: assistant
        content: I'll call the stable_tool with input 'still_here'. The ephemeral_tool is no longer available, so I can only use
          the stable_tool.
        tool_calls:
          - id: toolcall_2
            type: function
            function:
              name: stable_tool
              arguments: '{"input":"still_here"}'
      - role: tool
        tool_call_id: toolcall_2
        content: STABLE_still_here
      - role: assistant
        content: >-
          The stable_tool returned: **STABLE_still_here**


          The ephemeral_tool is not available anymore (it was removed as indicated in the tools_changed_notice), so I
          could only call the stable_tool.
