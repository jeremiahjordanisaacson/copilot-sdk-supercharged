models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Call the report_intent tool with intent 'Testing post hook', then reply done.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Testing post hook"}'
      - role: assistant
        tool_calls:
          - id: toolcall_1
            type: function
            function:
              name: view
              arguments: '{"path":"${workdir}"}'
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Call the report_intent tool with intent 'Testing post hook', then reply done.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: report_intent
              arguments: '{"intent":"Testing post hook"}'
          - id: toolcall_1
            type: function
            function:
              name: view
