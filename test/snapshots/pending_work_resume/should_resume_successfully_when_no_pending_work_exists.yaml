models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: "Reply with exactly: NO_PENDING_TURN_ONE"
      - role: assistant
        content: NO_PENDING_TURN_ONE
      - role: user
        content: "Reply with exactly: NO_PENDING_TURN_TWO"
      - role: assistant
        content: NO_PENDING_TURN_TWO
