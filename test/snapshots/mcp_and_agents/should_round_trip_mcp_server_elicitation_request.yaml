models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the test-elicitation-server-request_user_input tool and tell me the chosen color. Reply with just the
          color.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: test-elicitation-server-request_user_input
              arguments: "{}"
      - role: tool
        tool_call_id: toolcall_0
        content: '{"results":[{"action":"accept","content":{"color":"blue"}}]}'
      - role: assistant
        content: blue
