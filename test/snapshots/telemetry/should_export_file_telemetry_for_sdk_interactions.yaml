models:
  - claude-sonnet-4.5
conversations:
  - messages:
      - role: system
        content: ${system}
      - role: user
        content: Use the echo_telemetry_marker tool with value 'copilot-sdk-telemetry-e2e', then respond with
          TELEMETRY_E2E_DONE.
      - role: assistant
        tool_calls:
          - id: toolcall_0
            type: function
            function:
              name: echo_telemetry_marker
              arguments: '{"value":"copilot-sdk-telemetry-e2e"}'
      - role: tool
        tool_call_id: toolcall_0
        content: copilot-sdk-telemetry-e2e
      - role: assistant
        content: TELEMETRY_E2E_DONE
